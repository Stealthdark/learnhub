<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="100%" style="stop-color:#140a2e"/>
    </linearGradient>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 20 10 M 20 30 L 20 40 M 0 20 L 10 20 M 30 20 L 40 20" fill="none" stroke="#3a1f6a" stroke-width="0.5" opacity="0.5"/>
      <circle cx="20" cy="20" r="2" fill="#3a1f6a" opacity="0.4"/>
      <circle cx="0" cy="0" r="1" fill="#3a1f6a" opacity="0.3"/>
      <circle cx="40" cy="40" r="1" fill="#3a1f6a" opacity="0.3"/>
    </pattern>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#bg)"/>
  <rect width="600" height="220" fill="url(#circuit)"/>

  <!-- Purple glow center-right -->
  <radialGradient id="purpleGlow" cx="68%" cy="50%" r="38%">
    <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:0.18"/>
    <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:0"/>
  </radialGradient>
  <rect width="600" height="220" fill="url(#purpleGlow)"/>

  <!-- Pink accent glow -->
  <radialGradient id="pinkGlow" cx="85%" cy="20%" r="25%">
    <stop offset="0%" style="stop-color:#e91e63;stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#e91e63;stop-opacity:0"/>
  </radialGradient>
  <rect width="600" height="220" fill="url(#pinkGlow)"/>

  <!-- Neural network nodes (right side) -->
  <!-- Layer 1 (input) -->
  <circle cx="360" cy="55" r="8" fill="#7c4dff" opacity="0.3" filter="url(#glow-filter)"/>
  <circle cx="360" cy="55" r="5" fill="#7c4dff" opacity="0.8"/>
  <circle cx="360" cy="110" r="8" fill="#7c4dff" opacity="0.3" filter="url(#glow-filter)"/>
  <circle cx="360" cy="110" r="5" fill="#7c4dff" opacity="0.8"/>
  <circle cx="360" cy="165" r="8" fill="#7c4dff" opacity="0.3" filter="url(#glow-filter)"/>
  <circle cx="360" cy="165" r="5" fill="#7c4dff" opacity="0.8"/>

  <!-- Layer 2 (hidden 1) -->
  <circle cx="440" cy="38" r="8" fill="#9c6dff" opacity="0.3"/>
  <circle cx="440" cy="38" r="5" fill="#9c6dff" opacity="0.8"/>
  <circle cx="440" cy="88" r="8" fill="#9c6dff" opacity="0.3"/>
  <circle cx="440" cy="88" r="5" fill="#9c6dff" opacity="0.8"/>
  <circle cx="440" cy="138" r="8" fill="#9c6dff" opacity="0.3"/>
  <circle cx="440" cy="138" r="5" fill="#9c6dff" opacity="0.8"/>
  <circle cx="440" cy="182" r="8" fill="#9c6dff" opacity="0.3"/>
  <circle cx="440" cy="182" r="5" fill="#9c6dff" opacity="0.8"/>

  <!-- Layer 3 (output) -->
  <circle cx="520" cy="70" r="10" fill="#e91e63" opacity="0.25"/>
  <circle cx="520" cy="70" r="6" fill="#e91e63" opacity="0.9"/>
  <circle cx="520" cy="145" r="10" fill="#e91e63" opacity="0.25"/>
  <circle cx="520" cy="145" r="6" fill="#e91e63" opacity="0.9"/>

  <!-- Connections layer 1 → layer 2 -->
  <line x1="365" y1="55" x2="435" y2="38" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>
  <line x1="365" y1="55" x2="435" y2="88" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>
  <line x1="365" y1="55" x2="435" y2="138" stroke="#7c4dff" stroke-width="0.8" opacity="0.2"/>
  <line x1="365" y1="110" x2="435" y2="38" stroke="#7c4dff" stroke-width="0.8" opacity="0.2"/>
  <line x1="365" y1="110" x2="435" y2="88" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>
  <line x1="365" y1="110" x2="435" y2="138" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>
  <line x1="365" y1="110" x2="435" y2="182" stroke="#7c4dff" stroke-width="0.8" opacity="0.2"/>
  <line x1="365" y1="165" x2="435" y2="88" stroke="#7c4dff" stroke-width="0.8" opacity="0.2"/>
  <line x1="365" y1="165" x2="435" y2="138" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>
  <line x1="365" y1="165" x2="435" y2="182" stroke="#7c4dff" stroke-width="0.8" opacity="0.4"/>

  <!-- Connections layer 2 → layer 3 -->
  <line x1="445" y1="38" x2="514" y2="70" stroke="#e91e63" stroke-width="0.8" opacity="0.35"/>
  <line x1="445" y1="88" x2="514" y2="70" stroke="#e91e63" stroke-width="0.8" opacity="0.35"/>
  <line x1="445" y1="88" x2="514" y2="145" stroke="#e91e63" stroke-width="0.8" opacity="0.2"/>
  <line x1="445" y1="138" x2="514" y2="70" stroke="#e91e63" stroke-width="0.8" opacity="0.2"/>
  <line x1="445" y1="138" x2="514" y2="145" stroke="#e91e63" stroke-width="0.8" opacity="0.35"/>
  <line x1="445" y1="182" x2="514" y2="145" stroke="#e91e63" stroke-width="0.8" opacity="0.35"/>

  <!-- Left side: AI chat terminal -->
  <rect x="28" y="28" width="300" height="164" rx="8" fill="#080012" stroke="#3a1a6a" stroke-width="1.5" opacity="0.9"/>
  <!-- Terminal header -->
  <rect x="28" y="28" width="300" height="26" rx="8" fill="#120620"/>
  <rect x="28" y="42" width="300" height="12" fill="#120620"/>
  <circle cx="46" cy="41" r="4.5" fill="#ff5f57" opacity="0.7"/>
  <circle cx="60" cy="41" r="4.5" fill="#febc2e" opacity="0.7"/>
  <circle cx="74" cy="41" r="4.5" fill="#28c840" opacity="0.7"/>
  <text x="178" y="45" text-anchor="middle" fill="#4a2a8a" font-family="monospace" font-size="9">AI Dev Terminal</text>

  <!-- Chat lines -->
  <!-- User prompt -->
  <rect x="42" y="60" width="8" height="8" rx="2" fill="#7c4dff" opacity="0.7"/>
  <text x="55" y="68" fill="#9c8abf" font-family="monospace" font-size="9">&gt; You:</text>
  <text x="90" y="68" fill="#c0b0e0" font-family="monospace" font-size="9">Build a REST endpoint for /users</text>

  <!-- AI response indicator -->
  <circle cx="47" cy="84" r="4" fill="#e91e63" opacity="0.8"/>
  <text x="55" y="88" fill="#e91e63" font-family="monospace" font-size="9">◉ AI:</text>
  <text x="84" y="88" fill="#c0b0e0" font-family="monospace" font-size="9">Sure! Here's the code:</text>

  <!-- Code snippet -->
  <rect x="42" y="96" width="272" height="52" rx="4" fill="#0e0820" stroke="#2a1050" stroke-width="1"/>
  <text x="54" y="110" fill="#7c4dff" font-family="monospace" font-size="9">app</text>
  <text x="74" y="110" fill="#c0b0e0" font-family="monospace" font-size="9">.get(</text>
  <text x="104" y="110" fill="#e91e63" font-family="monospace" font-size="9">'/users'</text>
  <text x="147" y="110" fill="#c0b0e0" font-family="monospace" font-size="9">, async (req, res) =&gt; {'{'}</text>
  <text x="64" y="124" fill="#9c8abf" font-family="monospace" font-size="9">const users = await</text>
  <text x="184" y="124" fill="#7c4dff" font-family="monospace" font-size="9">User.find()</text>
  <text x="64" y="138" fill="#9c8abf" font-family="monospace" font-size="9">res.json({'{'} success:</text>
  <text x="187" y="138" fill="#8bc34a" font-family="monospace" font-size="9">true</text>
  <text x="210" y="138" fill="#9c8abf" font-family="monospace" font-size="9">, users {'}'} )</text>

  <!-- Second prompt -->
  <rect x="42" y="155" width="8" height="8" rx="2" fill="#7c4dff" opacity="0.7"/>
  <text x="55" y="163" fill="#9c8abf" font-family="monospace" font-size="9">&gt; You:</text>
  <text x="90" y="163" fill="#c0b0e0" font-family="monospace" font-size="9">Add input validation with Zod</text>

  <!-- Cursor -->
  <rect x="42" y="174" width="6" height="9" fill="#7c4dff" opacity="0.9"/>

  <!-- Decorative dots top-right area -->
  <circle cx="570" cy="20" r="3" fill="#e91e63" opacity="0.5"/>
  <circle cx="558" cy="30" r="2" fill="#7c4dff" opacity="0.4"/>
  <circle cx="580" cy="35" r="2" fill="#e91e63" opacity="0.3"/>
</svg>
