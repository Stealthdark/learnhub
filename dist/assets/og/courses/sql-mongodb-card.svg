<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050f1a"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#0a3050" opacity="0.7"/>
    </pattern>
    <radialGradient id="sqlGlow" cx="22%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#0288d1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mongoGlow" cx="78%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#47a248;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#47a248;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <rect width="600" height="220" fill="url(#dots)"/>
  <rect width="600" height="220" fill="url(#sqlGlow)"/>
  <rect width="600" height="220" fill="url(#mongoGlow)"/>

  <!-- SQL Table (left) -->
  <rect x="24" y="28" width="228" height="164" rx="8" fill="#050d1a" stroke="#0288d1" stroke-width="1.5" opacity="0.9"/>
  <rect x="24" y="28" width="228" height="28" rx="8" fill="#0a2540" opacity="0.9"/>
  <rect x="24" y="44" width="228" height="12" fill="#0a2540" opacity="0.9"/>
  <text x="38" y="40" fill="#0288d1" font-family="monospace" font-size="10" font-weight="bold">SELECT * FROM users</text>

  <line x1="24" y1="56" x2="252" y2="56" stroke="#0288d1" stroke-width="1" opacity="0.5"/>
  <rect x="24" y="56" width="228" height="22" fill="#071a2e" opacity="0.8"/>
  <text x="38" y="71" fill="#4fc3f7" font-family="monospace" font-size="9" font-weight="bold">id</text>
  <line x1="62" y1="56" x2="62" y2="78" stroke="#0a3050" stroke-width="1"/>
  <text x="74" y="71" fill="#4fc3f7" font-family="monospace" font-size="9" font-weight="bold">name</text>
  <line x1="130" y1="56" x2="130" y2="78" stroke="#0a3050" stroke-width="1"/>
  <text x="142" y="71" fill="#4fc3f7" font-family="monospace" font-size="9" font-weight="bold">email</text>
  <line x1="24" y1="78" x2="252" y2="78" stroke="#0288d1" stroke-width="1" opacity="0.4"/>

  <text x="38" y="94" fill="#b0bec5" font-family="monospace" font-size="9">001</text>
  <line x1="62" y1="78" x2="62" y2="100" stroke="#0a3050" stroke-width="1"/>
  <text x="74" y="94" fill="#b0bec5" font-family="monospace" font-size="9">Alice</text>
  <line x1="130" y1="78" x2="130" y2="100" stroke="#0a3050" stroke-width="1"/>
  <text x="142" y="94" fill="#b0bec5" font-family="monospace" font-size="9">a@co.com</text>
  <line x1="24" y1="100" x2="252" y2="100" stroke="#0a3050" stroke-width="1"/>

  <text x="38" y="116" fill="#b0bec5" font-family="monospace" font-size="9">002</text>
  <line x1="62" y1="100" x2="62" y2="122" stroke="#0a3050" stroke-width="1"/>
  <text x="74" y="116" fill="#b0bec5" font-family="monospace" font-size="9">Bob</text>
  <line x1="130" y1="100" x2="130" y2="122" stroke="#0a3050" stroke-width="1"/>
  <text x="142" y="116" fill="#b0bec5" font-family="monospace" font-size="9">b@co.com</text>
  <line x1="24" y1="122" x2="252" y2="122" stroke="#0a3050" stroke-width="1"/>

  <text x="38" y="138" fill="#b0bec5" font-family="monospace" font-size="9">003</text>
  <line x1="62" y1="122" x2="62" y2="144" stroke="#0a3050" stroke-width="1"/>
  <text x="74" y="138" fill="#b0bec5" font-family="monospace" font-size="9">Carol</text>
  <line x1="130" y1="122" x2="130" y2="144" stroke="#0a3050" stroke-width="1"/>
  <text x="142" y="138" fill="#b0bec5" font-family="monospace" font-size="9">c@co.com</text>
  <line x1="24" y1="144" x2="252" y2="144" stroke="#0a3050" stroke-width="1"/>

  <text x="38" y="162" fill="#0288d1" font-family="monospace" font-size="11" font-weight="bold">SQL / PostgreSQL</text>
  <text x="38" y="178" fill="#4fc3f7" font-family="monospace" font-size="9" opacity="0.7">Structured · ACID · Relations</text>

  <!-- Double-headed arrow (center) -->
  <line x1="270" y1="110" x2="326" y2="110" stroke="#546e7a" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="258,110 270,103 270,117" fill="#546e7a"/>
  <polygon points="338,110 326,103 326,117" fill="#546e7a"/>
  <text x="298" y="130" text-anchor="middle" fill="#546e7a" font-family="monospace" font-size="9">vs</text>

  <!-- MongoDB Document (right) -->
  <rect x="348" y="28" width="228" height="164" rx="8" fill="#050e0a" stroke="#47a248" stroke-width="1.5" opacity="0.9"/>
  <rect x="348" y="28" width="228" height="28" rx="8" fill="#0a2010" opacity="0.9"/>
  <rect x="348" y="44" width="228" height="12" fill="#0a2010" opacity="0.9"/>
  <text x="362" y="40" fill="#47a248" font-family="monospace" font-size="10" font-weight="bold">db.users.findOne({'{}'})</text>

  <line x1="348" y1="56" x2="576" y2="56" stroke="#47a248" stroke-width="1" opacity="0.4"/>
  <text x="362" y="74" fill="#4caf50" font-family="monospace" font-size="10">{'{'}</text>
  <text x="374" y="90" fill="#80cbc4" font-family="monospace" font-size="9">_id:</text>
  <text x="406" y="90" fill="#ffcc02" font-family="monospace" font-size="9">ObjectId("a1b2...")</text>
  <text x="374" y="106" fill="#80cbc4" font-family="monospace" font-size="9">name:</text>
  <text x="413" y="106" fill="#e8b4bc" font-family="monospace" font-size="9">"Alice"</text>
  <text x="374" y="122" fill="#80cbc4" font-family="monospace" font-size="9">email:</text>
  <text x="416" y="122" fill="#e8b4bc" font-family="monospace" font-size="9">"a@co.com"</text>
  <text x="374" y="138" fill="#80cbc4" font-family="monospace" font-size="9">tags:</text>
  <text x="409" y="138" fill="#4fc3f7" font-family="monospace" font-size="9">["admin", "user"]</text>
  <text x="374" y="154" fill="#80cbc4" font-family="monospace" font-size="9">meta:</text>
  <text x="409" y="154" fill="#4caf50" font-family="monospace" font-size="9">{'{'} created: ISODate {'}'}</text>
  <text x="362" y="170" fill="#4caf50" font-family="monospace" font-size="10">{'}'}</text>

  <text x="362" y="184" fill="#47a248" font-family="monospace" font-size="9" font-weight="bold">Schema-less · Flexible · Scalable</text>
</svg>
