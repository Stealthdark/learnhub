<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<defs>

  <!-- ── Background gradient ── -->
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#05091A"/>
    <stop offset="45%"  stop-color="#0A1530"/>
    <stop offset="100%" stop-color="#120827"/>
  </linearGradient>

  <!-- ── Blue glow (top-right) ── -->
  <radialGradient id="glowBlue" cx="1050" cy="-30" r="480" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#1A73E8" stop-opacity="0.60"/>
    <stop offset="45%"  stop-color="#2563EB" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#1A73E8" stop-opacity="0"/>
  </radialGradient>

  <!-- ── Purple glow (bottom-left) ── -->
  <radialGradient id="glowPurple" cx="60" cy="660" r="380" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.55"/>
    <stop offset="55%"  stop-color="#6D28D9" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>

  <!-- ── Teal accent glow (center-right) ── -->
  <radialGradient id="glowTeal" cx="980" cy="400" r="260" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#0D9488" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
  </radialGradient>

  <!-- ── Logo gradient ── -->
  <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#4F46E5"/>
  </linearGradient>

  <!-- ── Headline accent gradient ── -->
  <linearGradient id="headlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#60A5FA"/>
    <stop offset="100%" stop-color="#A78BFA"/>
  </linearGradient>

  <!-- ── Pill gradients ── -->
  <linearGradient id="pill1bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#1D4ED8" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="pill2bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#0D9488" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#0891B2" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="pill3bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#9333EA" stop-opacity="0.15"/>
  </linearGradient>

  <!-- ── Dot grid pattern ── -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.07)"/>
  </pattern>

  <!-- ── Subtle glow filter ── -->
  <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="40"/>
  </filter>

  <!-- ── Logo inner shadow ── -->
  <filter id="logoShadow">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A73E8" flood-opacity="0.5"/>
  </filter>

  <!-- ── Text glow filter ── -->
  <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

</defs>

<!-- ══════════════════════════════════════
     BACKGROUND LAYERS
     ══════════════════════════════════════ -->

<!-- Base background -->
<rect width="1200" height="630" fill="url(#bg)"/>

<!-- Glow blobs (rendered at lower res via filter) -->
<rect width="1200" height="630" fill="url(#glowBlue)"/>
<rect width="1200" height="630" fill="url(#glowPurple)"/>
<rect width="1200" height="630" fill="url(#glowTeal)"/>

<!-- Dot grid texture -->
<rect width="1200" height="630" fill="url(#dots)"/>

<!-- ══════════════════════════════════════
     DECORATIVE ELEMENTS
     ══════════════════════════════════════ -->

<!-- Concentric rings (top-right) -->
<circle cx="1100" cy="70"  r="140" fill="none" stroke="#2563EB" stroke-opacity="0.18" stroke-width="1"/>
<circle cx="1100" cy="70"  r="230" fill="none" stroke="#2563EB" stroke-opacity="0.10" stroke-width="1"/>
<circle cx="1100" cy="70"  r="320" fill="none" stroke="#4F46E5" stroke-opacity="0.06" stroke-width="1"/>

<!-- Small decorative dots cluster (right side, mid) -->
<circle cx="1060" cy="330" r="3" fill="#4F8EF7" opacity="0.6"/>
<circle cx="1085" cy="350" r="2" fill="#A78BFA" opacity="0.5"/>
<circle cx="1040" cy="360" r="2" fill="#60A5FA" opacity="0.4"/>
<circle cx="1100" cy="310" r="2" fill="#4F8EF7" opacity="0.3"/>
<circle cx="1075" cy="295" r="1.5" fill="#A78BFA" opacity="0.4"/>

<!-- Horizontal shimmer line -->
<line x1="64" y1="144" x2="500" y2="144" stroke="url(#headlineGrad)" stroke-width="1" stroke-opacity="0.35"/>

<!-- Bottom left accent corner line -->
<line x1="0"  y1="580" x2="48" y2="580" stroke="#7C3AED" stroke-width="2" stroke-opacity="0.5"/>
<line x1="48" y1="580" x2="48" y2="630" stroke="#7C3AED" stroke-width="2" stroke-opacity="0.5"/>

<!-- Right side vertical deco line -->
<line x1="900" y1="80"  x2="900" y2="550" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

<!-- ══════════════════════════════════════
     LOGO + BRAND
     ══════════════════════════════════════ -->

<!-- Logo box (rounded square with gradient) -->
<rect x="64" y="52" width="60" height="60" rx="16" fill="url(#logoGrad)" filter="url(#logoShadow)"/>

<!-- Logo highlight shimmer -->
<rect x="64" y="52" width="60" height="30" rx="16" fill="rgba(255,255,255,0.12)"/>
<rect x="64" y="67" width="60" height="15" fill="rgba(255,255,255,0.12)"/>

<!-- Logo "L" letter -->
<text x="94" y="91"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="32" font-weight="800"
      fill="white" text-anchor="middle" dominant-baseline="auto">L</text>

<!-- Brand name "LearnHub.Dev" -->
<text x="140" y="85"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="28" font-weight="700" letter-spacing="-0.5">
  <tspan fill="white">LearnHub</tspan><tspan fill="#60A5FA">.Dev</tspan>
</text>

<!-- ══════════════════════════════════════
     MAIN HEADLINE
     ══════════════════════════════════════ -->

<!-- "Professional" -->
<text x="64" y="248"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="80" font-weight="800" letter-spacing="-2"
      fill="white">Professional</text>

<!-- "Learning" — gradient accent -->
<text x="64" y="342"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="80" font-weight="800" letter-spacing="-2"
      fill="url(#headlineGrad)" filter="url(#textGlow)">Learning</text>

<!-- "Platform." -->
<text x="64" y="436"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="80" font-weight="800" letter-spacing="-2"
      fill="rgba(255,255,255,0.90)">Platform.</text>

<!-- ══════════════════════════════════════
     TAGLINE
     ══════════════════════════════════════ -->

<text x="64" y="484"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="21" font-weight="400" letter-spacing="0"
      fill="rgba(255,255,255,0.48)">Master programming with structured roadmaps — free, self-paced.</text>

<!-- ══════════════════════════════════════
     STAT PILLS
     ══════════════════════════════════════ -->

<!-- Pill 1: 2 Courses -->
<rect x="64"  y="506" width="128" height="38" rx="19"
      fill="url(#pill1bg)" stroke="#3B82F6" stroke-opacity="0.45" stroke-width="1"/>
<text x="128" y="530"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="15" font-weight="700"
      fill="#93C5FD" text-anchor="middle">2 Courses</text>

<!-- Pill 2: 60+ Days -->
<rect x="204" y="506" width="118" height="38" rx="19"
      fill="url(#pill2bg)" stroke="#0D9488" stroke-opacity="0.45" stroke-width="1"/>
<text x="263" y="530"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="15" font-weight="700"
      fill="#5EEAD4" text-anchor="middle">60+ Days</text>

<!-- Pill 3: Free Forever -->
<rect x="334" y="506" width="145" height="38" rx="19"
      fill="url(#pill3bg)" stroke="#7C3AED" stroke-opacity="0.45" stroke-width="1"/>
<text x="406" y="530"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="15" font-weight="700"
      fill="#C4B5FD" text-anchor="middle">Free Forever</text>

<!-- ══════════════════════════════════════
     URL / FOOTER
     ══════════════════════════════════════ -->

<text x="64" y="594"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="17" font-weight="400"
      fill="rgba(255,255,255,0.22)">learnhub.dev</text>

</svg>
