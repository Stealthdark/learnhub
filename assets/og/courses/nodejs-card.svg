<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="nodebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f0a"/>
      <stop offset="100%" style="stop-color:#1a3a1a"/>
    </linearGradient>
    <pattern id="nodedots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#3a6e3a" opacity="0.4"/>
    </pattern>
    <radialGradient id="nodeglow" cx="75%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#68a063;stop-opacity:0.13"/>
      <stop offset="100%" style="stop-color:#68a063;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#nodebg)"/>
  <rect width="600" height="220" fill="url(#nodedots)"/>
  <rect width="600" height="220" fill="url(#nodeglow)"/>

  <!-- Node.js Hexagon (right side) — filled glow + outline -->
  <polygon points="490,42 530,64.8 530,110.4 490,133.2 450,110.4 450,64.8" fill="#68a063" opacity="0.15"/>
  <polygon points="490,42 530,64.8 530,110.4 490,133.2 450,110.4 450,64.8" fill="none" stroke="#68a063" stroke-width="2" opacity="0.6"/>
  <text x="490" y="91" text-anchor="middle" fill="#68a063" font-family="monospace" font-size="15" font-weight="bold" opacity="0.9">Node</text>
  <text x="490" y="108" text-anchor="middle" fill="#8bc34a" font-family="monospace" font-size="12" opacity="0.7">.js</text>

  <!-- Decorative small hexagons -->
  <polygon points="555,62 573,72.4 573,93.2 555,103.6 537,93.2 537,72.4" fill="none" stroke="#68a063" stroke-width="1.2" opacity="0.25"/>
  <polygon points="415,155 428,162.5 428,177.5 415,185 402,177.5 402,162.5" fill="#68a063" opacity="0.15"/>

  <!-- Terminal window -->
  <rect x="28" y="28" width="295" height="164" rx="8" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1.5" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="28" y="28" width="295" height="26" rx="8" fill="#1a2e1a"/>
  <rect x="28" y="42" width="295" height="12" fill="#1a2e1a"/>
  <!-- Traffic lights -->
  <circle cx="48" cy="41" r="5" fill="#ff5f57" opacity="0.8"/>
  <circle cx="64" cy="41" r="5" fill="#febc2e" opacity="0.8"/>
  <circle cx="80" cy="41" r="5" fill="#28c840" opacity="0.8"/>
  <text x="175" y="45" text-anchor="middle" fill="#4a7a4a" font-family="monospace" font-size="10">bash -- node</text>

  <!-- Terminal output lines -->
  <text x="48" y="76"  fill="#4a7a4a" font-family="monospace" font-size="11">$ node server.js</text>
  <text x="48" y="94"  fill="#68a063" font-family="monospace" font-size="11">v Listening on :3000</text>
  <text x="48" y="112" fill="#4a7a4a" font-family="monospace" font-size="11">$ curl localhost:3000/api/users</text>
  <text x="48" y="130" fill="#8bc34a" font-family="monospace" font-size="10">[{id:1, name:&quot;Alice&quot;}, ...]</text>
  <text x="48" y="148" fill="#4a7a4a" font-family="monospace" font-size="11">$ npm run dev</text>
  <text x="48" y="166" fill="#68a063" font-family="monospace" font-size="10">&gt; nodemon watching: *.js</text>

  <!-- Blinking cursor -->
  <rect x="48" y="176" width="7" height="10" fill="#68a063" opacity="0.8"/>
</svg>
