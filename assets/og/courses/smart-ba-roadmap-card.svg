<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="babg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1f"/>
      <stop offset="100%" style="stop-color:#0d1e3a"/>
    </linearGradient>
    <pattern id="badots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#1a3a6e" opacity="0.5"/>
    </pattern>
    <radialGradient id="baglow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="baglow2" cx="80%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#babg)"/>
  <rect width="600" height="220" fill="url(#badots)"/>
  <rect width="600" height="220" fill="url(#baglow)"/>
  <rect width="600" height="220" fill="url(#baglow2)"/>

  <!-- ── Left: BPMN Process Flow ── -->
  <rect x="24" y="28" width="260" height="164" rx="8" fill="#05101f" stroke="#1a73e8" stroke-width="1.5" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="24" y="28" width="260" height="26" rx="8" fill="#0a1e3d" opacity="0.9"/>
  <rect x="24" y="43" width="260" height="11" fill="#0a1e3d" opacity="0.9"/>
  <text x="38" y="45" fill="#4285f4" font-family="monospace" font-size="10" font-weight="bold">Process Flow — Loan Approval</text>
  <line x1="24" y1="54" x2="284" y2="54" stroke="#1a73e8" stroke-width="1" opacity="0.4"/>

  <!-- Start event (green circle) -->
  <circle cx="55" cy="85" r="10" fill="none" stroke="#34a853" stroke-width="2"/>
  <circle cx="55" cy="85" r="5" fill="#34a853" opacity="0.8"/>
  <!-- Arrow -->
  <line x1="65" y1="85" x2="85" y2="85" stroke="#4285f4" stroke-width="1.5" opacity="0.7"/>
  <polygon points="85,82 92,85 85,88" fill="#4285f4" opacity="0.7"/>

  <!-- Task 1 -->
  <rect x="92" y="75" width="52" height="20" rx="4" fill="#0d2040" stroke="#4285f4" stroke-width="1.2"/>
  <text x="118" y="89" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="7.5">Review</text>
  <!-- Arrow -->
  <line x1="144" y1="85" x2="162" y2="85" stroke="#4285f4" stroke-width="1.5" opacity="0.7"/>
  <polygon points="162,82 169,85 162,88" fill="#4285f4" opacity="0.7"/>

  <!-- Decision diamond -->
  <polygon points="181,72 198,85 181,98 164,85" fill="#0d2040" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="181" y="88" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="6.5">OK?</text>
  <!-- Yes arrow (right) -->
  <line x1="198" y1="85" x2="218" y2="85" stroke="#4285f4" stroke-width="1.5" opacity="0.7"/>
  <polygon points="218,82 225,85 218,88" fill="#4285f4" opacity="0.7"/>
  <text x="207" y="80" text-anchor="middle" fill="#34a853" font-family="monospace" font-size="7" opacity="0.8">Y</text>
  <!-- No arrow (down) -->
  <line x1="181" y1="98" x2="181" y2="116" stroke="#4285f4" stroke-width="1.5" opacity="0.7"/>
  <polygon points="178,116 181,123 184,116" fill="#4285f4" opacity="0.7"/>
  <text x="189" y="112" fill="#ea4335" font-family="monospace" font-size="7" opacity="0.8">N</text>

  <!-- Reject box (below diamond) -->
  <rect x="155" y="123" width="52" height="18" rx="4" fill="#1a0d0d" stroke="#ea4335" stroke-width="1.2"/>
  <text x="181" y="135" text-anchor="middle" fill="#ef9a9a" font-family="monospace" font-size="7">Reject</text>

  <!-- Approve box (right of diamond) -->
  <rect x="225" y="75" width="52" height="20" rx="4" fill="#0a1f0f" stroke="#34a853" stroke-width="1.2"/>
  <text x="251" y="89" text-anchor="middle" fill="#81c784" font-family="monospace" font-size="7">Approve</text>
  <!-- Arrow to end -->
  <line x1="251" y1="95" x2="251" y2="113" stroke="#4285f4" stroke-width="1.5" opacity="0.7"/>
  <polygon points="248,113 251,120 254,113" fill="#4285f4" opacity="0.7"/>

  <!-- End event (red circle) -->
  <circle cx="251" cy="132" r="10" fill="none" stroke="#ea4335" stroke-width="2.5"/>
  <circle cx="251" cy="132" r="6" fill="#ea4335" opacity="0.7"/>

  <!-- Swimlane labels -->
  <line x1="24" y1="160" x2="284" y2="160" stroke="#1a3a6e" stroke-width="1" opacity="0.5"/>
  <text x="38" y="177" fill="#1a73e8" font-family="monospace" font-size="10" font-weight="bold">BPMN 2.0</text>
  <text x="38" y="192" fill="#5e97f6" font-family="monospace" font-size="8.5" opacity="0.7">Process Modeling · Swimlanes · Gateways</text>

  <!-- ── Center divider (implied by gap) ── -->

  <!-- ── Right: Requirements Card ── -->
  <rect x="316" y="28" width="260" height="164" rx="8" fill="#05101f" stroke="#4285f4" stroke-width="1.5" opacity="0.9"/>
  <rect x="316" y="28" width="260" height="26" rx="8" fill="#0a1e3d" opacity="0.9"/>
  <rect x="316" y="43" width="260" height="11" fill="#0a1e3d" opacity="0.9"/>
  <text x="330" y="45" fill="#4285f4" font-family="monospace" font-size="10" font-weight="bold">BRD — Requirements Register</text>
  <line x1="316" y1="54" x2="576" y2="54" stroke="#1a73e8" stroke-width="1" opacity="0.4"/>

  <!-- Column headers -->
  <rect x="316" y="54" width="260" height="16" fill="#071529" opacity="0.8"/>
  <text x="330" y="66" fill="#90caf9" font-family="monospace" font-size="8" font-weight="bold">ID</text>
  <text x="358" y="66" fill="#90caf9" font-family="monospace" font-size="8" font-weight="bold">Requirement</text>
  <text x="516" y="66" fill="#90caf9" font-family="monospace" font-size="8" font-weight="bold">Status</text>
  <line x1="316" y1="70" x2="576" y2="70" stroke="#1a73e8" stroke-width="1" opacity="0.4"/>

  <!-- Row 1 -->
  <text x="330" y="83" fill="#b0bec5" font-family="monospace" font-size="8">BR-01</text>
  <text x="358" y="83" fill="#b0bec5" font-family="monospace" font-size="8">User login w/ SSO</text>
  <rect x="513" y="74" width="46" height="12" rx="3" fill="#0a2e1a"/>
  <text x="536" y="83" text-anchor="middle" fill="#34a853" font-family="monospace" font-size="7.5">Approved</text>
  <line x1="316" y1="88" x2="576" y2="88" stroke="#0a2040" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="330" y="101" fill="#b0bec5" font-family="monospace" font-size="8">BR-02</text>
  <text x="358" y="101" fill="#b0bec5" font-family="monospace" font-size="8">Report export PDF</text>
  <rect x="513" y="92" width="46" height="12" rx="3" fill="#2a1e00"/>
  <text x="536" y="101" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="7.5">Review</text>
  <line x1="316" y1="106" x2="576" y2="106" stroke="#0a2040" stroke-width="1"/>

  <!-- Row 3 -->
  <text x="330" y="119" fill="#b0bec5" font-family="monospace" font-size="8">BR-03</text>
  <text x="358" y="119" fill="#b0bec5" font-family="monospace" font-size="8">Role-based access</text>
  <rect x="513" y="110" width="46" height="12" rx="3" fill="#0a2e1a"/>
  <text x="536" y="119" text-anchor="middle" fill="#34a853" font-family="monospace" font-size="7.5">Approved</text>
  <line x1="316" y1="124" x2="576" y2="124" stroke="#0a2040" stroke-width="1"/>

  <!-- Row 4 -->
  <text x="330" y="137" fill="#b0bec5" font-family="monospace" font-size="8">NFR-01</text>
  <text x="358" y="137" fill="#b0bec5" font-family="monospace" font-size="8">Response &lt; 2 sec</text>
  <rect x="513" y="128" width="46" height="12" rx="3" fill="#1a0d1a"/>
  <text x="536" y="137" text-anchor="middle" fill="#ce93d8" font-family="monospace" font-size="7.5">Draft</text>
  <line x1="316" y1="142" x2="576" y2="142" stroke="#0a2040" stroke-width="1"/>

  <!-- Row 5 -->
  <text x="330" y="155" fill="#b0bec5" font-family="monospace" font-size="8">NFR-02</text>
  <text x="358" y="155" fill="#b0bec5" font-family="monospace" font-size="8">GDPR compliance</text>
  <rect x="513" y="146" width="46" height="12" rx="3" fill="#2a1e00"/>
  <text x="536" y="155" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="7.5">Review</text>
  <line x1="316" y1="160" x2="576" y2="160" stroke="#0a2040" stroke-width="1"/>

  <text x="330" y="177" fill="#1a73e8" font-family="monospace" font-size="10" font-weight="bold">Requirements Engineering</text>
  <text x="330" y="192" fill="#5e97f6" font-family="monospace" font-size="8.5" opacity="0.7">BRD · FRD · Traceability · Agile</text>
</svg>
