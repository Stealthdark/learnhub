<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>LearnHub — OG Image Generator</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:32px;margin:0}
  h1{font-size:22px;margin-bottom:8px;color:#fff}
  p{font-size:14px;color:#94a3b8;margin-bottom:32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:24px}
  .card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155}
  .card h2{font-size:15px;margin:0 0 12px;color:#94a3b8;font-weight:500}
  canvas{width:100%;height:auto;border-radius:8px;display:block;border:1px solid #334155}
  button{margin-top:12px;background:#2563eb;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;width:100%}
  button:hover{background:#1d4ed8}
</style>
</head>
<body>
<h1>LearnHub — OG Image Generator</h1>
<p>Open this file in a browser once to generate and download the OG PNG images. Place the downloaded files in <code>assets/og/</code>.</p>
<div class="grid">
  <div class="card">
    <h2>1. Main Site — learnhub-og.png</h2>
    <canvas id="c0" width="1200" height="630"></canvas>
    <button onclick="download('c0','learnhub-og.png')">⬇ Download learnhub-og.png</button>
  </div>
  <div class="card">
    <h2>2. Node.js Course — nodejs-og.png</h2>
    <canvas id="c1" width="1200" height="630"></canvas>
    <button onclick="download('c1','nodejs-og.png')">⬇ Download nodejs-og.png</button>
  </div>
  <div class="card">
    <h2>3. Frontend Roadmap — frontend-og.png</h2>
    <canvas id="c2" width="1200" height="630"></canvas>
    <button onclick="download('c2','frontend-og.png')">⬇ Download frontend-og.png</button>
  </div>
</div>

<script>
const W=1200,H=630;

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawBase(ctx,bgStart,bgEnd,accent){
  // Background gradient
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,bgStart);
  bg.addColorStop(1,bgEnd);
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Accent glow top-right
  const radial=ctx.createRadialGradient(W*0.88,H*0.12,0,W*0.88,H*0.12,380);
  radial.addColorStop(0,accent+'55');
  radial.addColorStop(0.5,accent+'15');
  radial.addColorStop(1,'transparent');
  ctx.fillStyle=radial;
  ctx.fillRect(0,0,W,H);

  // Accent glow bottom-left
  const r2=ctx.createRadialGradient(W*0.08,H*0.88,0,W*0.08,H*0.88,250);
  r2.addColorStop(0,accent+'22');
  r2.addColorStop(1,'transparent');
  ctx.fillStyle=r2;
  ctx.fillRect(0,0,W,H);

  // Grid pattern overlay (subtle)
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1;
  for(let x=0;x<=W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawLogo(ctx,x,y,size=52){
  // Logo background
  ctx.fillStyle='#1a73e8';
  roundRect(ctx,x,y,size,size,12);
  ctx.fill();
  // L letter
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.round(size*0.55)}px 'SF Pro Display',system-ui,sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('L',x+size/2,y+size/2+1);
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
}

function drawBadge(ctx,x,y,text,bg,color){
  ctx.font='bold 18px system-ui,sans-serif';
  const tw=ctx.measureText(text).width;
  const pw=20,ph=10,r=20;
  roundRect(ctx,x,y-(ph),tw+pw*2,32+ph*0,r);
  ctx.fillStyle=bg;
  ctx.fill();
  ctx.fillStyle=color;
  ctx.fillText(text,x+pw,y+4);
}

// ── Card 0: Main Site ──────────────────────────────────────────
(function(){
  const ctx=document.getElementById('c0').getContext('2d');
  drawBase(ctx,'#0d1b2e','#0f2742','#1a73e8');

  // Decorative circles
  ctx.strokeStyle='rgba(26,115,232,0.15)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(W-80,80,160,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W-80,80,260,0,Math.PI*2);ctx.stroke();

  // Logo + Brand
  drawLogo(ctx,64,60);
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold 28px system-ui,sans-serif';
  ctx.fillText('LearnHub',128,95);

  // Main headline
  ctx.fillStyle='#ffffff';
  ctx.font='bold 72px system-ui,sans-serif';
  ctx.fillText('Professional',64,240);
  ctx.fillStyle='#1a73e8';
  ctx.fillText('Learning',64,325);
  ctx.fillStyle='#ffffff';
  ctx.fillText('Platform.',64,410);

  // Tagline
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font='24px system-ui,sans-serif';
  ctx.fillText('Master programming with structured roadmaps.',64,470);

  // Stats pills
  const stats=[['2 Courses','#1a73e8'],['60+ Days','#0d9488'],['Free Forever','#7c3aed']];
  let sx=64;
  stats.forEach(([label,color])=>{
    ctx.font='bold 16px system-ui,sans-serif';
    const tw=ctx.measureText(label).width;
    roundRect(ctx,sx,510,tw+32,36,18);
    ctx.fillStyle=color+'30';
    ctx.fill();
    roundRect(ctx,sx,510,tw+32,36,18);
    ctx.strokeStyle=color+'60';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle=color;
    ctx.fillText(label,sx+16,534);
    sx+=tw+32+12;
  });

  // URL
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.font='18px system-ui,sans-serif';
  ctx.fillText('learnhub.dev',64,598);
})();

// ── Card 1: Node.js Course ─────────────────────────────────────
(function(){
  const ctx=document.getElementById('c1').getContext('2d');
  const accent='#22c55e';
  drawBase(ctx,'#0d1f12','#0a2517',accent);

  // Decorative
  ctx.strokeStyle='rgba(34,197,94,0.12)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(W-60,H-60,200,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W-60,H-60,310,0,Math.PI*2);ctx.stroke();

  // Logo + Brand
  drawLogo(ctx,64,56);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 22px system-ui,sans-serif';
  ctx.fillText('LearnHub',128,88);

  // Course badge
  drawBadge(ctx,64,162,'30-Day Roadmap','rgba(34,197,94,0.2)','#22c55e');

  // Title
  ctx.fillStyle='#ffffff';
  ctx.font='bold 68px system-ui,sans-serif';
  ctx.fillText('Node.js',64,270);
  ctx.fillStyle='#22c55e';
  ctx.fillText('Mastery',64,350);
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.font='26px system-ui,sans-serif';
  ctx.fillText('Build real-world APIs, CLIs & full-stack apps.',64,408);

  // Stats
  const stats=[['30 Days','#22c55e'],['2–3 hrs/day','#0ea5e9'],['Beginner Friendly','#f59e0b']];
  let sx=64;
  stats.forEach(([label,color])=>{
    ctx.font='bold 16px system-ui,sans-serif';
    const tw=ctx.measureText(label).width;
    roundRect(ctx,sx,470,tw+32,36,18);
    ctx.fillStyle=color+'28';
    ctx.fill();
    roundRect(ctx,sx,470,tw+32,36,18);
    ctx.strokeStyle=color+'55';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle=color;
    ctx.fillText(label,sx+16,494);
    sx+=tw+32+12;
  });

  // Enroll badge
  ctx.fillStyle='#22c55e';
  roundRect(ctx,64,530,220,52,12);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 20px system-ui,sans-serif';
  ctx.fillText('Enroll Free →',64+40,562);

  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='17px system-ui,sans-serif';
  ctx.fillText('learnhub.dev',64,606);
})();

// ── Card 2: Frontend Roadmap ───────────────────────────────────
(function(){
  const ctx=document.getElementById('c2').getContext('2d');
  const accent='#f97316';
  drawBase(ctx,'#1a0f00','#2a1500',accent);

  // Decorative
  ctx.strokeStyle='rgba(249,115,22,0.1)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(W*0.9,H*0.15,200,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.9,H*0.15,320,0,Math.PI*2);ctx.stroke();

  // Phase indicators top-right
  const phases=[['H','#e44d26'],['C','#4b7bff'],['J','#f7df1e']];
  phases.forEach(([letter,color],i)=>{
    const px=W-200+i*70;
    ctx.fillStyle=color+'30';
    roundRect(ctx,px,40,52,52,10);
    ctx.fill();
    ctx.fillStyle=color;
    ctx.font='bold 26px system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(letter,px+26,73);
    ctx.textAlign='left';
  });

  // Logo + Brand
  drawLogo(ctx,64,56);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 22px system-ui,sans-serif';
  ctx.fillText('LearnHub',128,88);

  // Badge
  drawBadge(ctx,64,162,'60-Day Roadmap','rgba(249,115,22,0.2)','#f97316');

  // Title
  ctx.fillStyle='#ffffff';
  ctx.font='bold 60px system-ui,sans-serif';
  ctx.fillText('Frontend',64,268);
  ctx.fillStyle='#f97316';
  ctx.fillText('Mastery',64,344);
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='24px system-ui,sans-serif';
  ctx.fillText('HTML · CSS · JavaScript — Zero to Production',64,396);

  // Phase labels
  const phaseLabels=[['HTML','#e44d26'],['CSS','#4b7bff'],['JavaScript','#f7df1e']];
  let px=64;
  phaseLabels.forEach(([label,color])=>{
    ctx.font='bold 15px system-ui,sans-serif';
    const tw=ctx.measureText(label).width;
    roundRect(ctx,px,440,tw+28,34,17);
    ctx.fillStyle=color+'28';
    ctx.fill();
    ctx.strokeStyle=color+'50';
    ctx.lineWidth=1;
    roundRect(ctx,px,440,tw+28,34,17);
    ctx.stroke();
    ctx.fillStyle=color;
    ctx.fillText(label,px+14,462);
    px+=tw+28+10;
  });

  // Enroll badge
  ctx.fillStyle='#f97316';
  roundRect(ctx,64,500,220,52,12);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 20px system-ui,sans-serif';
  ctx.fillText('Enroll Free →',64+40,532);

  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='17px system-ui,sans-serif';
  ctx.fillText('learnhub.dev',64,574);
})();

function download(id,filename){
  const a=document.createElement('a');
  a.href=document.getElementById(id).toDataURL('image/png');
  a.download=filename;
  a.click();
}
</script>
</body>
</html>
